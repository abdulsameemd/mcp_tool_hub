<line x1="365" y1="64" x2="440" y2="110" stroke="#B4B2A9" stroke-width="0.5" fill="none" marker-end="url(#arr)"/>
<line x1="390" y1="64" x2="590" y2="110" stroke="#B4B2A9" stroke-width="0.5" fill="none" marker-end="url(#arr)"/>

