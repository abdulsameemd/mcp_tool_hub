<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Claude + SAP Fiori/UI5 architecture — DEWA</title>
<desc>Layered architecture showing Developer, Claude clients, MCP servers, context files, DEWA project, and SAP deployment targets</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; }

    /* teal */
    .t-fill  { fill:#E1F5EE; stroke:#1D9E75; stroke-width:0.5; }
    .t-th    { fill:#085041; }
    .t-ts    { fill:#0F6E56; }
    /* purple */
    .p-fill  { fill:#EEEDFE; stroke:#7F77DD; stroke-width:0.5; }
    .p-th    { fill:#3C3489; }
    .p-ts    { fill:#534AB7; }
    /* amber */
    .a-fill  { fill:#FAEEDA; stroke:#BA7517; stroke-width:0.5; }
    .a-th    { fill:#633806; }
    .a-ts    { fill:#854F0B; }
    /* coral */
    .co-fill { fill:#FAECE7; stroke:#D85A30; stroke-width:0.5; }
    .co-th   { fill:#712B13; }
    .co-ts   { fill:#993C1D; }
    /* blue */
    .b-fill  { fill:#E6F1FB; stroke:#378ADD; stroke-width:0.5; }
    .b-th    { fill:#0C447C; }
    .b-ts    { fill:#185FA5; }
    /* green */
    .g-fill  { fill:#EAF3DE; stroke:#639922; stroke-width:0.5; }
    .g-th    { fill:#27500A; }
    .g-ts    { fill:#3B6D11; }
    /* gray */
    .gr-fill { fill:#F1EFE8; stroke:#888780; stroke-width:0.5; }
    .gr-th   { fill:#2C2C2A; }
    .gr-ts   { fill:#5F5E5A; }
    /* legend */
    .leg     { font-size: 12px; fill:#5F5E5A; }
  </style>
</defs>

<!-- ── DEVELOPER ───────────────────────── -->
<rect class="gr-fill" x="240" y="20" width="200" height="44" rx="8"/>
<text class="th gr-th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Developer</text>

<text class="ts" x="340" y="84" text-anchor="middle" dominant-baseline="central" fill="#888780">choose a client</text>

<!-- fan arrows dev → clients -->
